  .stats-row { display: flex; gap: 12px; align-items: center; }
  .stat-item { text-align: center; padding: 3px 10px; border: 1px solid rgba(100,100,255,0.12); border-radius: 6px; background: rgba(25,25,55,0.5); }
  .stat-val { font-size: 14px; font-weight: 700; color: #60a5fa; }
  .stat-label { font-size: 8px; color: #777; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Tab Menu */
  #tabMenu {
    position: absolute; top: 56px; left: 0; right: 0;
    background: rgba(12,12,30,0.95); border-bottom: 1px solid rgba(100,100,255,0.15);
    display: flex; z-index: 100; padding: 0 16px;
  }
  .tab-btn {
    padding: 8px 16px; font-size: 11px; color: #888;
    border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s; white-space: nowrap;
  }
  .tab-btn:hover { color: #bbb; }
  .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; font-weight: 600; }

  /* Side panels */
  .side-panel {
    position: absolute; top: 90px; max-height: calc(100vh - 110px);
    background: rgba(12,12,30,0.94); border: 1px solid rgba(100,100,255,0.18);
    border-radius: 10px; padding: 14px; overflow-y: auto; z-index: 100;
    backdrop-filter: blur(12px); display: none;
  }
  #panelBuildings { right: 10px; width: 310px; display: block; }
  #panelInsights { left: 10px; width: 380px; }
  #panelFloor { left: 10px; width: 360px; }

  .side-panel h3 { font-size: 13px; color: #a78bfa; border-bottom: 1px solid rgba(100,100,255,0.18); padding-bottom: 5px; margin-bottom: 8px; }

  /* Building cards */
  .bcard {
    background: rgba(25,25,55,0.5); border: 1px solid rgba(100,100,255,0.12);
    border-radius: 7px; padding: 8px 10px; margin-bottom: 6px; cursor: pointer;
    transition: all 0.25s; border-left: 3px solid transparent;
  }
  .bcard:hover, .bcard.active { border-color: #60a5fa; background: rgba(40,40,80,0.5); transform: translateX(-3px); }
  .bcard .bname { font-size: 11px; font-weight: 600; }
  .bcard .bsub { font-size: 9px; color: #777; }
  .bcard .bstats { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .bcard .bs { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: rgba(40,40,80,0.5); }
  .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 600; }

  /* Insight cards */
  .insight-card {
    background: rgba(25,25,55,0.5); border: 1px solid rgba(100,100,255,0.12);
    border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
    border-left: 3px solid #a78bfa;
  }
  .insight-card h4 { font-size: 12px; font-weight: 600; color: #60a5fa; margin-bottom: 4px; }
  .insight-card .finding { font-size: 10px; color: #ccc; margin-bottom: 6px; line-height: 1.5; }
  .insight-card .solution { font-size: 10px; color: #7cd47c; background: rgba(40,160,40,0.1); border-radius: 4px; padding: 6px 8px; line-height: 1.5; }
  .insight-card .val { font-weight: 700; color: #ff6b6b; }
  .insight-card .val-ok { font-weight: 700; color: #4ecdc4; }

  .floor-row {
    display: flex; align-items: center; gap: 6px; padding: 5px 7px; margin-bottom: 3px;
    border-radius: 5px; background: rgba(25,25,55,0.4); border-left: 3px solid; font-size: 10px;

  .floor-row .fn { font-weight: 600; min-width: 36px; }
  .floor-row .fs { color: #aaa; }

    position: absolute; display: none; background: rgba(8,8,24,0.96);
    border: 1px solid rgba(100,100,255,0.35); border-radius: 8px; padding: 10px 14px;

    position: absolute; bottom: 10px; left: 10px;

  .ld { width: 10px; height: 10px; border-radius: 2px; }

  /* Controls */
  #controls {
    position: absolute; bottom: 10px; right: 10px;
    display: flex; gap: 6px; z-index: 100; flex-wrap: wrap; justify-content: flex-end; max-width: 420px;

  .cb {
    background: rgba(25,25,55,0.85); border: 1px solid rgba(100,100,255,0.25);
    color: #ccc; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 10px;

let scene,camera,renderer,controls,raycaster,mouse,clock;
let floorMeshes=[],deadZones=[],labelSprites=[],allGroups=[];
let currentView='signal',isExploded=false,showLabels=true;
let hoveredFloor=null,particleSystem;

function init(){
  scene=new THREE.Scene();

  raycaster=new THREE.Raycaster();mouse=new THREE.Vector2();clock=new THREE.Clock();

  scene.add(new THREE.AmbientLight(0x404070,0.5));

  dl.position.set(30,50,20);dl.castShadow=true;
  dl.shadow.mapSize.width=2048;dl.shadow.mapSize.height=2048;
  dl.shadow.camera.near=1;dl.shadow.camera.far=120;
  dl.shadow.camera.left=-60;dl.shadow.camera.right=60;
  dl.shadow.camera.top=60;dl.shadow.camera.bottom=-60;
  scene.add(dl);
  scene.add(new THREE.PointLight(0x5555ff,0.3,80).translateX(-25).translateY(20));
  scene.add(new THREE.PointLight(0xff5555,0.2,80).translateX(25).translateY(15).translateZ(10));

  // Ground
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(140,100),new THREE.MeshStandardMaterial({color:0x141a14,roughness:0.95}));
  ground.rotation.x=-Math.PI/2;ground.position.y=-0.1;ground.receiveShadow=true;scene.add(ground);
  scene.add(new THREE.GridHelper(140,70,0x1a1a33,0x0f0f22));

  // Roads
  const rm=new THREE.MeshStandardMaterial({color:0x2a2a35,roughness:0.85});
  [[-50,0.02,-22,100,2.5],[50,0.02,0,2.5,60],[-35,0.02,0,2.5,50],[0,0.02,-22,2.5,10],[0,0.02,25,50,2]].forEach(([x,y,z,w,h])=>{
    const r=new THREE.Mesh(new THREE.PlaneGeometry(w,h),rm);r.rotation.x=-Math.PI/2;r.position.set(x,y,z);scene.add(r);
  });

  // Trees
  const tl=new THREE.MeshStandardMaterial({color:0x1a5a1a,transparent:true,opacity:0.75});
  const tt=new THREE.MeshStandardMaterial({color:0x4a3a2a});
  [[-18,-20],[-12,-20],[8,-18],[24,-18],[-34,-10],[-34,8],[32,8],[32,-8],[-8,26],[6,26],[20,20],[-20,14],[30,14],[-14,-6],[12,-14]].forEach(([x,z])=>{
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,1.2,6),tt);trunk.position.set(x,0.6,z);scene.add(trunk);
    const leaf=new THREE.Mesh(new THREE.SphereGeometry(0.7,7,5),tl);leaf.position.set(x,1.8,z);scene.add(leaf);

function rssiColor(r){
  if(r>=-50)return new THREE.Color(0x00ff88);if(r>=-60)return new THREE.Color(0x44cc44);
  if(r>=-67)return new THREE.Color(0xffdd00);if(r>=-70)return new THREE.Color(0xff9900);
  if(r>=-80)return new THREE.Color(0xff4444);return new THREE.Color(0xcc0000);
}

function buildWiFiBuildings(){
  const fH=1.3,gap=0.06;
  WIFI_BUILDINGS.forEach((b,bi)=>{
    const g=new THREE.Group();g.position.set(b.pos[0],0,b.pos[2]);
    g.userData={building:b,index:bi,isWifi:true};

    // Foundation
    const base=new THREE.Mesh(new THREE.BoxGeometry(b.sz[0]+0.5,0.25,b.sz[2]+0.5),
      new THREE.MeshStandardMaterial({color:0x2a2a3a,roughness:0.7}));
    base.position.y=0.125;base.receiveShadow=true;g.add(base);

    // Glow ring under building
    const ring=new THREE.Mesh(new THREE.RingGeometry(Math.max(b.sz[0],b.sz[2])*0.6,Math.max(b.sz[0],b.sz[2])*0.7,32),
      new THREE.MeshBasicMaterial({color:rssiColor(b.rssi),transparent:true,opacity:0.15,side:THREE.DoubleSide}));
    ring.rotation.x=-Math.PI/2;ring.position.y=0.01;g.add(ring);

    b.floors.forEach((fl,fi)=>{
      const y=0.25+fi*(fH+gap);
      const c=rssiColor(fl.rssi);
      const mat=new THREE.MeshStandardMaterial({color:c,transparent:true,opacity:0.82,roughness:0.35,metalness:0.1});
      const geo=new THREE.BoxGeometry(b.sz[0],fH,b.sz[2]);
      const mesh=new THREE.Mesh(geo,mat);
      mesh.position.y=y+fH/2;mesh.castShadow=true;mesh.receiveShadow=true;
      mesh.userData={building:b,floor:fl,bi:bi,fi:fi,origY:y+fH/2,type:'floor'};
      g.add(mesh);floorMeshes.push(mesh);

      // Edge wireframe
      const edges=new THREE.LineSegments(new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.12}));
      edges.position.copy(mesh.position);g.add(edges);

      // Dead zone sphere
      if(fl.weak>70){
        const sz=0.3+fl.weak/200;
        const sp=new THREE.Mesh(new THREE.SphereGeometry(sz,12,12),
          new THREE.MeshBasicMaterial({color:0xff0000,transparent:true,opacity:0.45}));
        sp.position.set(b.sz[0]/2+1,y+fH/2,0);sp.userData={type:'deadzone',floor:fl,building:b};
        g.add(sp);deadZones.push(sp);
      }

      // Floor label
      const lbl=makeLabel(fl.f,0.3);lbl.position.set(-b.sz[0]/2-0.7,y+fH/2,0);
      lbl.userData={type:'label'};g.add(lbl);labelSprites.push(lbl);
    });

    // Building top label
    const topY=0.25+b.floors.length*(fH+gap)+0.8;
    const nl=makeLabel(b.code+'\n'+b.en,0.6);nl.position.set(0,topY,0);
    nl.userData={type:'label'};g.add(nl);labelSprites.push(nl);

    scene.add(g);allGroups.push(g);
  });
}

function buildOtherBuildings(){
  const fH=1.2;
  OTHER_BUILDINGS.forEach(b=>{
    const g=new THREE.Group();g.position.set(b.pos[0],0,b.pos[2]);
    g.userData={isWifi:false,code:b.code};

    for(let i=0;i<b.fl;i++){
      const y=0.1+i*(fH+0.05);
      const mat=new THREE.MeshStandardMaterial({
        color:b.color||0x3a3a4a,transparent:true,opacity:0.4,roughness:0.6});
      const mesh=new THREE.Mesh(new THREE.BoxGeometry(b.sz[0],fH,b.sz[2]),mat);
      mesh.position.y=y+fH/2;mesh.castShadow=true;mesh.receiveShadow=true;
      g.add(mesh);
    }

    const lbl=makeLabel(b.code+'\n'+b.en,0.4);
    lbl.position.y=b.fl*(fH+0.05)+1;
    lbl.material.opacity=0.5;g.add(lbl);labelSprites.push(lbl);

    scene.add(g);allGroups.push(g);
  });
}

function makeLabel(text,scale){
  const c=document.createElement('canvas');const ctx=c.getContext('2d');
  const lines=text.split('\n');
  c.width=256;c.height=48*Math.max(lines.length,1);
  ctx.font='bold 22px Segoe UI,Tahoma,sans-serif';
  ctx.textAlign='center';ctx.fillStyle='#fff';ctx.strokeStyle='#000';ctx.lineWidth=3;
  lines.forEach((l,i)=>{const y=26+i*28;ctx.strokeText(l,128,y);ctx.fillText(l,128,y);});
  const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.85,depthTest:false}));
  sp.scale.set(scale*4*(lines.length>1?1.1:1),scale*1.3*lines.length,1);
  return sp;
}

function createParticles(){
  const N=400;const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(N*3),col=new Float32Array(N*3),vels=[];
  for(let i=0;i<N;i++){
    const bi=Math.floor(Math.random()*WIFI_BUILDINGS.length);const b=WIFI_BUILDINGS[bi];
    pos[i*3]=b.pos[0]+(Math.random()-0.5)*b.sz[0];
    pos[i*3+1]=Math.random()*b.floors.length*1.4+0.3;
    pos[i*3+2]=b.pos[2]+(Math.random()-0.5)*b.sz[2];
    const cl=rssiColor(b.rssi);col[i*3]=cl.r;col[i*3+1]=cl.g;col[i*3+2]=cl.b;
    vels.push({y:0.008+Math.random()*0.025,maxY:b.floors.length*1.4+2,bi});
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const mat=new THREE.PointsMaterial({size:0.12,vertexColors:true,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
  particleSystem=new THREE.Points(geo,mat);particleSystem.userData.vels=vels;scene.add(particleSystem);
}

function animateParticles(){
  if(!particleSystem)return;
  const p=particleSystem.geometry.attributes.position.array;
  const v=particleSystem.userData.vels;
  for(let i=0;i<v.length;i++){
    p[i*3+1]+=v[i].y;
    if(p[i*3+1]>v[i].maxY){
      const b=WIFI_BUILDINGS[v[i].bi];
      p[i*3]=b.pos[0]+(Math.random()-0.5)*b.sz[0];p[i*3+1]=0.3;
      p[i*3+2]=b.pos[2]+(Math.random()-0.5)*b.sz[2];
    }
  }
  particleSystem.geometry.attributes.position.needsUpdate=true;
}

function setView(mode){
  currentView=mode;
  document.querySelectorAll('#controls .cb').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('v'+mode.charAt(0).toUpperCase()+mode.slice(1));
  if(el)el.classList.add('active');
  const mxU=Math.max(...WIFI_BUILDINGS.flatMap(b=>b.floors.map(f=>f.users)));
  const mxG=Math.max(...WIFI_BUILDINGS.flatMap(b=>b.floors.map(f=>f.gb)));
  floorMeshes.forEach(m=>{
    const fl=m.userData.floor;let c;
    if(mode==='signal')c=rssiColor(fl.rssi);
    else if(mode==='users'){const t=Math.min(fl.users/mxU,1);c=new THREE.Color().setHSL(0.55-t*0.55,0.8,0.3+t*0.35);}
    else{const t=Math.min(fl.gb/mxG,1);c=new THREE.Color().setHSL(0.55-t*0.55,0.7,0.3+t*0.3);}
    m.material.color=c;m.material.needsUpdate=true;
  });
}

function toggleExplode(){
  isExploded=!isExploded;document.getElementById('bExplode').classList.toggle('active',isExploded);
  floorMeshes.forEach(m=>{m.userData.targetY=m.userData.origY+(isExploded?m.userData.fi*1.5:0);});
}

function toggleLabels(){

  labelSprites.forEach(s=>{s.visible=showLabels;});
}

function buildInsightsPanel(items){
  let h='<h3>💡 Deep Insights ('+items.length+')</h3>';
  const cats=[...new Set(items.map(x=>x.cat))];
  h+='<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap">';
  h+='<button class="cb active" onclick="filterInsights(\'all\',this)" style="padding:3px 8px;font-size:9px">All</button>';
  const catNames={signal:'Signal',capacity:'Capacity',anomaly:'Anomaly',mobility:'Mobility',time:'Time',tech:'Tech',users:'Users'};
  cats.forEach(c=>{
    h+=`<button class="cb" onclick="filterInsights('${c}',this)" style="padding:3px 8px;font-size:9px">${catNames[c]||c}</button>`;
  });
  h+='</div><div id="insightList">';
  items.forEach(ins=>{
    const sc=ins.severity==='critical'?'#ff4444':ins.severity==='high'?'#ff9900':'#ffdd00';
    h+=`<div class="insight-card" data-cat="${ins.cat}" style="border-left-color:${sc}">
      <h4>${ins.icon} #${ins.id}: ${ins.title} <span style="font-size:9px;color:${sc}">[${ins.severity.toUpperCase()}]</span></h4>
      <div class="finding">${ins.finding}</div>
      <div class="solution">💡 <strong>Solution:</strong> ${ins.solution}</div></div>`;
  });
  h+='</div>';
  document.getElementById('panelInsights').innerHTML=h;
}

     actions:['Install 4 APs per dead zone floor','Use directional antennas for corridors','Deploy mesh extenders','Signal repeaters for elevator areas']},
    {pri:'P2',title:'Enable Fast Roaming Campus-wide',cost:'$',time:'1-2 weeks',
     desc:'71.5% users are roamers. 78.2% travel between buildings. No seamless handoff configured.',
     actions:['Enable 802.11r (Fast BSS Transition)','Enable 802.11k/v','Configure -67 dBm handoff threshold','Deploy PMK caching']},
    {pri:'P2',title:'Fix Failed Sessions (9.1%)',cost:'$$',time:'2 weeks',
     desc:'17K+ failed sessions. Some APs fail at 26% despite good RSSI — infrastructure issue.',
     actions:['Expand DHCP pool (especially B77)','Fix DNS resolution','Update firmware on 19 high-fail APs','Replace B26-F10-AP02 hardware']},
    {pri:'P3',title:'Peak Hour Capacity Planning',cost:'$$$',time:'1 month',
     desc:'Noon peak at 24K sessions with 69% weak. System designed for 1/3 of actual load.',
     actions:['Deploy portable APs for 11-14h peak','Time-based QoS policies','5G cellular offload integration','Bandwidth throttling for non-essential traffic']},
    {pri:'P3',title:'Long-term: WiFi 6E Campus Upgrade',cost:'$$$$$',time:'6-12 months',
     desc:'Comprehensive campus-wide upgrade to WiFi 6E with proper site survey and design.',
     actions:['Ekahau site survey for all buildings','WiFi 6E AP deployment (107→250+ APs)','New controller infrastructure','Implement AI-driven RF management']},
  ];
  solutions.forEach((s,i)=>{
    const pc=s.pri==='P0'?'#ff0000':s.pri==='P1'?'#ff4444':s.pri==='P2'?'#ff9900':'#ffdd00';
    h+=`<div class="insight-card" style="border-left-color:${pc}">
      <h4><span style="background:${pc}33;color:${pc};padding:1px 6px;border-radius:3px">${s.pri}</span> ${s.title}
        <span style="font-size:9px;color:#888">Cost: ${s.cost} | Time: ${s.time}</span></h4>
      <div class="finding">${s.desc}</div>
      <div class="solution">${s.actions.map(a=>'✅ '+a).join('<br>')}</div></div>`;
  });
  document.getElementById('panelInsights').innerHTML=h;
}

function focusBldg(idx){
  const b=WIFI_BUILDINGS[idx];
  document.querySelectorAll('.bcard').forEach(c=>c.classList.remove('active'));
  const el=document.getElementById('bc'+idx);if(el)el.classList.add('active');

  // Camera animation
  const tp=new THREE.Vector3(b.pos[0]+15,b.floors.length*2+8,b.pos[2]+15);
  const tl=new THREE.Vector3(b.pos[0],b.floors.length*0.7,b.pos[2]);
  const sp=camera.position.clone(),st=controls.target.clone();
  let t=0;(function anim(){
    t+=0.03;if(t>1)t=1;const e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    camera.position.lerpVectors(sp,tp,e);controls.target.lerpVectors(st,tl,e);controls.update();
    if(t<1)requestAnimationFrame(anim);
  })();

  showFloorDetail(b);
}

function showFloorDetail(b){
  const p=document.getElementById('panelFloor');p.style.display='block';
  let h=`<h3>📊 ${b.code} — ${b.en}</h3>
    <div style="font-size:10px;color:#777;margin-bottom:8px">${b.sess.toLocaleString()} sessions | ${b.users.toLocaleString()} users | ${b.gb} GB | ${b.floors.length} floors</div>`;

  [...b.floors].sort((a,c)=>c.n-a.n).forEach(f=>{
    const c=f.rssi>=-60?'#44cc44':f.rssi>=-67?'#ffdd00':f.rssi>=-70?'#ff9900':f.rssi>=-80?'#ff4444':'#cc0000';
    const dz=f.weak>70?' 🔴':f.weak>50?' ⚠️':'';
    h+=`<div class="floor-row" style="border-left-color:${c}">
      <div class="fn">${f.f}</div>
      <div style="flex:1;display:flex;gap:5px;flex-wrap:wrap">
        <span class="fs">📶 ${f.rssi}</span><span class="fs">⚠️ ${f.weak}%</span>
        <span class="fs">👥 ${f.users.toLocaleString()}</span><span class="fs">📡 ${f.aps}</span>
        <span class="fs">💾 ${f.gb}GB</span>
        <span style="color:${f.weak>70?'#ff4444':'#ff9900'};font-weight:600;font-size:10px">${dz}</span>
      </div></div>`;
  });

  const wf=[...b.floors].sort((a,c)=>a.rssi-c.rssi)[0];
  h+=`<div style="margin-top:10px;padding:8px;background:rgba(255,40,40,0.08);border-radius:6px;border-left:3px solid #ff4444">
    <div style="font-size:10px;font-weight:600;color:#ff6666">🔍 Issues:</div>
    <div style="font-size:9px;color:#ccc;margin-top:3px;line-height:1.5">
      • Worst floor: ${wf.f} (${wf.rssi} dBm, ${wf.weak}% weak)<br>
      • Users/AP ratio: ${Math.round(b.users/b.floors.reduce((s,f)=>s+f.aps,0))}:1 (recommended: 50:1)<br>
      ${b.zero>5?`• ⚠️ ${b.zero}% zero-byte failures`:''}
    </div></div>
  <div style="margin-top:6px;padding:8px;background:rgba(40,200,80,0.08);border-radius:6px;border-left:3px solid #44cc44">
    <div style="font-size:10px;font-weight:600;color:#44cc44">💡 Actions:</div>
    <div style="font-size:9px;color:#ccc;margin-top:3px;line-height:1.5">
      • Add ${Math.ceil(b.floors.filter(f=>f.weak>60).length*2)} APs to weak floors<br>
      • Enable fast roaming (802.11r/k/v)<br>
      • Deploy signal repeaters on ${wf.f}<br>
      • Upgrade to WiFi 6E high-density APs
    </div></div>`;
  p.innerHTML=h;
}

// ============================================================
// INTERACTION
// ============================================================
function onMouseMove(e){
  mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(floorMeshes);
  const tt=document.getElementById('tooltip');

  if(hoveredFloor&&hoveredFloor.material){hoveredFloor.material.opacity=0.82;hoveredFloor.material.emissive.setHex(0);}

  if(hits.length>0){
    const m=hits[0].object;if(m.userData.type==='floor'){
      hoveredFloor=m;m.material.opacity=1.0;m.material.emissive.setHex(0x222244);
      const f=m.userData.floor,b=m.userData.building;
      const ql=f.rssi>=-50?'Excellent ✅':f.rssi>=-60?'Very Good 👍':f.rssi>=-67?'Good 👌':f.rssi>=-70?'Fair ⚠️':f.rssi>=-80?'Weak ❌':'Very Poor 🚫';
      tt.style.display='block';tt.style.left=(e.clientX+12)+'px';tt.style.top=(e.clientY-10)+'px';
      tt.innerHTML=`<div class="tn">${b.code} — ${f.f}</div>
        <div class="tr">📶 RSSI: <b>${f.rssi} dBm</b> (${ql})</div>
        <div class="tr">📊 SNR: ${f.snr} dB</div>
        <div class="tr">⚠️ Weak: <b style="color:${f.weak>70?'#ff4444':'#ff9900'}">${f.weak}%</b></div>
        <div class="tr">👥 Users: ${f.users.toLocaleString()}</div>
        <div class="tr">📡 APs: ${f.aps}</div>
        <div class="tr">💾 Data: ${f.gb} GB</div>
        <div class="tr">📱 Sessions: ${f.sess.toLocaleString()}</div>`;
      document.body.style.cursor='pointer';return;
    }
  }
  tt.style.display='none';document.body.style.cursor='default';hoveredFloor=null;
}

function onMouseClick(){
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(floorMeshes);
  if(hits.length>0&&hits[0].object.userData.type==='floor')focusBldg(hits[0].object.userData.bi);
}

function onResize(){
  camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

// ============================================================
// MINIMAP
// ============================================================
function drawMinimap(){
  const cv=document.querySelector('#minimap canvas');if(!cv)return;
  const ctx=cv.getContext('2d');cv.width=140;cv.height=100;
  ctx.fillStyle='#080818';ctx.fillRect(0,0,140,100);
  const sc=1.8,ox=70,oy=55;

  // Draw other buildings first
  OTHER_BUILDINGS.forEach(b=>{
    ctx.fillStyle='rgba(60,60,80,0.4)';
    ctx.fillRect(ox+b.pos[0]*sc-b.sz[0]*sc/2,oy+b.pos[2]*sc-b.sz[2]*sc/2,b.sz[0]*sc,b.sz[2]*sc);
  });

  // WiFi buildings
  WIFI_BUILDINGS.forEach(b=>{
    const x=ox+b.pos[0]*sc,y=oy+b.pos[2]*sc;
    const cl=rssiColor(b.rssi);
    ctx.fillStyle=`rgb(${cl.r*255|0},${cl.g*255|0},${cl.b*255|0})`;
    ctx.globalAlpha=0.7;
    ctx.fillRect(x-b.sz[0]*sc/2,y-b.sz[2]*sc/2,b.sz[0]*sc,b.sz[2]*sc);
    ctx.globalAlpha=1;ctx.strokeStyle='#fff';ctx.lineWidth=0.4;
    ctx.strokeRect(x-b.sz[0]*sc/2,y-b.sz[2]*sc/2,b.sz[0]*sc,b.sz[2]*sc);
    ctx.fillStyle='#fff';ctx.font='6px sans-serif';ctx.textAlign='center';
    ctx.fillText(b.code,x,y+2);
  });

  // Camera dot
  const cx=Math.max(4,Math.min(136,ox+camera.position.x*sc*0.25));
  const cz=Math.max(4,Math.min(96,oy+camera.position.z*sc*0.25));
  ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.arc(cx,cz,2.5,0,Math.PI*2);ctx.fill();
}

// ============================================================
// ANIMATION
// ============================================================
function animate(){
  requestAnimationFrame(animate);const t=clock.getElapsedTime();

  deadZones.forEach((s,i)=>{
    s.material.opacity=0.25+0.45*Math.sin(t*3+i*1.5);
    const sc=0.7+0.4*Math.sin(t*2+i);s.scale.set(sc,sc,sc);
  });

  floorMeshes.forEach(m=>{
    if(m.userData.targetY!==undefined){
      const d=m.userData.targetY-m.position.y;if(Math.abs(d)>0.01)m.position.y+=d*0.08;
    }
  });

  animateParticles();
  if(Math.floor(t*60)%30===0)drawMinimap();

  controls.update();renderer.render(scene,camera);
}

// ============================================================
// BOOT
// ============================================================
init();animate();
</script>
